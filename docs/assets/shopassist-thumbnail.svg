<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="96" y1="48" x2="1196" y2="612" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="0.5" stop-color="#EEF4FB"/>
      <stop offset="1" stop-color="#E6EEF8"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#466A98"/>
      <stop offset="1" stop-color="#28486F"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#D9E4F5"/>
      <stop offset="1" stop-color="#F7FAFE"/>
    </linearGradient>
    <filter id="shadow-lg" x="-40" y="-40" width="1360" height="720" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="26" flood-color="#1E3557" flood-opacity="0.12"/>
    </filter>
    <filter id="shadow-sm" x="0" y="0" width="1280" height="640" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1E3557" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1280" height="640" rx="28" fill="url(#bg)"/>

  <circle cx="1126" cy="118" r="142" fill="#D9E6F5" opacity="0.75"/>
  <circle cx="1158" cy="140" r="98" fill="#EEF5FC"/>
  <circle cx="129" cy="554" r="112" fill="#E2ECF8"/>

  <g filter="url(#shadow-lg)">
    <rect x="60" y="58" width="1160" height="524" rx="34" fill="#FFFFFF"/>
  </g>

  <rect x="60" y="58" width="1160" height="524" rx="34" stroke="#E2EAF5"/>

  <g>
    <rect x="60" y="58" width="320" height="524" rx="34" fill="#18253E"/>
    <rect x="84" y="92" width="48" height="48" rx="18" fill="url(#hero)"/>
    <text x="108" y="123" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#FFFFFF">SA</text>
    <text x="148" y="118" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#FFFFFF">ShopAssist AI</text>
    <text x="148" y="146" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#AFC1DA">Customer support workspace</text>

    <rect x="84" y="202" width="272" height="56" rx="18" fill="#2B456A"/>
    <text x="112" y="237" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="600" fill="#FFFFFF">Dashboard</text>

    <text x="96" y="314" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" fill="#EAF1FA">Conversations</text>
    <text x="96" y="372" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" fill="#EAF1FA">Tickets</text>
    <text x="96" y="430" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" fill="#EAF1FA">Help Center</text>

    <rect x="84" y="486" width="272" height="72" rx="22" fill="#152138" stroke="#263A5A"/>
    <text x="108" y="527" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" fill="#FFFFFF">Human handoff</text>
    <text x="108" y="551" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#AFC1DA">Conversation context stays attached</text>
  </g>

  <g>
    <text x="438" y="140" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="2.6" fill="#6D819D">AI-POWERED CUSTOMER SUPPORT</text>
    <text x="438" y="198" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="38" font-weight="800" fill="#15233B">Support that answers,</text>
    <text x="438" y="244" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="38" font-weight="800" fill="#15233B">tracks, escalates,</text>
    <text x="438" y="290" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="38" font-weight="800" fill="#15233B">and keeps context.</text>
    <text x="438" y="348" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21" fill="#617792">A support workspace built for order questions, grounded</text>
    <text x="438" y="378" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21" fill="#617792">answers, and human follow-up when automation should stop.</text>
  </g>

  <g filter="url(#shadow-sm)">
    <rect x="438" y="434" width="350" height="108" rx="26" fill="url(#hero)"/>
  </g>
  <text x="470" y="474" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#DCE8F7">Customer support</text>
  <text x="470" y="513" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="27" font-weight="800" fill="#FFFFFF">How can we help today?</text>

  <g filter="url(#shadow-sm)">
    <rect x="872" y="188" width="276" height="126" rx="28" fill="#FFFFFF"/>
    <rect x="872" y="188" width="276" height="126" rx="28" stroke="#E2EAF5"/>
  </g>
  <text x="900" y="226" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#1C2D49">Open tickets</text>
  <text x="1058" y="226" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#5877A3">4 active</text>
  <rect x="900" y="244" width="218" height="1" fill="#E9EFF7"/>
  <text x="900" y="274" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="600" fill="#223655">Refund request</text>
  <text x="900" y="298" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#687F9D">Assigned to Returns Desk</text>
  <rect x="1020" y="258" width="98" height="28" rx="14" fill="#FFF2CA"/>
  <text x="1069" y="277" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#A56A00">Waiting</text>

  <text x="872" y="358" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#1C2D49">Knowledge-backed answers</text>
  <rect x="872" y="378" width="104" height="28" rx="14" fill="#DDF6E4"/>
  <text x="924" y="397" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#2A7A47">Grounded</text>
  <rect x="988" y="378" width="116" height="28" rx="14" fill="#E8EFFA"/>
  <text x="1046" y="397" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#50709D">Policy-aware</text>

  <g filter="url(#shadow-sm)">
    <rect x="872" y="430" width="276" height="112" rx="28" fill="#F8FBFF" stroke="#E2EAF5"/>
  </g>
  <text x="900" y="470" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#1C2D49">Order context</text>
  <text x="900" y="498" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#687F9D">Shipment, refund, and return details help the</text>
  <text x="900" y="522" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#687F9D">assistant answer questions and route follow-up.</text>
</svg>
